<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Nokia Snake – XCV Sterwork</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}

    body{
      background:#0d0d18;
      display:flex;justify-content:center;align-items:center;
      min-height:100vh;overflow:hidden;
      font-family:'Press Start 2P',monospace;
      touch-action:none;
    }

    /* ===== PHONE BODY ===== */
    #phone{
      width:272px;
      background:linear-gradient(160deg,#232340 0%,#14142a 50%,#0e0e20 100%);
      border-radius:22px 22px 34px 34px;
      box-shadow:0 0 0 2px #2a2a4a,0 30px 80px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.08);
      padding:14px 14px 22px;
      user-select:none;position:relative;
    }

    /* Earpiece */
    #earpiece{
      width:60px;height:6px;
      background:#0a0a18;
      border-radius:3px;
      margin:0 auto 10px;
      box-shadow:inset 0 1px 3px rgba(0,0,0,.8);
    }

    /* ===== SCREEN WRAPPER ===== */
    #screen-wrapper{
      background:#080810;
      border-radius:10px 10px 6px 6px;
      padding:10px;
      margin-bottom:8px;
      box-shadow:inset 0 3px 10px rgba(0,0,0,.9);
    }

    /* LCD Screen */
    #screen{
      background:#8fac44;
      width:100%;height:164px;
      border-radius:3px;
      position:relative;overflow:hidden;
      box-shadow:inset 0 0 14px rgba(0,0,0,.35),0 0 6px rgba(143,172,68,.25);
    }
    /* Scanlines */
    #screen::after{
      content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 3px);
      pointer-events:none;z-index:20;
    }

    /* STATUS BAR */
    #status-bar{
      display:flex;justify-content:space-between;align-items:center;
      padding:3px 5px 2px;height:14px;
      border-bottom:1px solid rgba(15,45,8,.35);
      position:relative;z-index:5;
    }
    #status-left{display:flex;align-items:center;gap:3px}
    #status-right{display:flex;align-items:center;gap:3px}
    .signal-bars{display:flex;align-items:flex-end;gap:1px}
    .sbar{background:#1a4010;border-radius:1px}
    .sbar:nth-child(1){width:2px;height:3px}
    .sbar:nth-child(2){width:2px;height:5px}
    .sbar:nth-child(3){width:2px;height:7px}
    .sbar:nth-child(4){width:2px;height:9px}
    #operator-name{font-size:6px;color:#1a4010;letter-spacing:.3px}
    .batt-wrap{display:flex;align-items:center;gap:2px}
    #batt-icon{
      width:14px;height:7px;border:1px solid #1a4010;border-radius:1px;
      position:relative;padding:1px;display:flex;align-items:center;
    }
    #batt-icon::after{
      content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);
      width:2px;height:3px;background:#1a4010;border-radius:0 1px 1px 0;
    }
    #batt-fill{height:100%;background:#1a4010;border-radius:1px;transition:width .5s;width:80%}
    #batt-pct{font-size:5px;color:#1a4010}

    /* MAIN CONTENT AREA */
    #main-area{
      flex:1;display:flex;flex-direction:column;
      height:136px;position:relative;overflow:hidden;
    }

    /* SOFTKEY BAR */
    #softkey-bar{
      display:flex;justify-content:space-between;align-items:center;
      padding:2px 6px;height:14px;
      border-top:1px solid rgba(15,45,8,.35);
      position:relative;z-index:5;
    }
    .sk-lbl{font-size:5px;color:#1a4010}

    /* ===== SCREEN PANELS ===== */
    .panel{display:none;width:100%;height:100%;flex-direction:column}
    .panel.active{display:flex}

    /* --- STARTUP --- */
    #panel-startup{
      align-items:center;justify-content:center;
      background:#8fac44;
    }
    #startup-logo{font-size:20px;color:#1a4010;letter-spacing:6px;opacity:0;transition:opacity .6s}
    #startup-logo.show{opacity:1}

    /* --- LOCKSCREEN --- */
    #panel-lock{
      align-items:center;justify-content:space-between;
      padding:10px 6px 8px;background:transparent;
    }
    #lock-top{text-align:center}
    #lock-time{font-size:22px;color:#1a4010;letter-spacing:3px;line-height:1}
    #lock-date{font-size:6px;color:#1a4010;margin-top:5px;letter-spacing:.5px}
    #lock-icon{font-size:10px;color:#1a4010;margin-bottom:4px}
    #slide-track{
      width:100%;height:18px;
      background:rgba(15,45,8,.15);
      border:1px solid rgba(15,45,8,.4);
      border-radius:9px;position:relative;overflow:hidden;cursor:pointer;
    }
    #slide-hint{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:4px;color:rgba(15,45,8,.5);letter-spacing:.8px;pointer-events:none;
    }
    #slide-thumb{
      position:absolute;left:2px;top:2px;
      width:22px;height:14px;
      background:#1a4010;border-radius:7px;
      cursor:grab;z-index:2;
    }

    /* --- MENU --- */
    #panel-menu{padding:5px 4px}
    .menu-title{font-size:7px;color:#1a4010;text-align:center;border-bottom:1px solid #1a4010;padding-bottom:3px;margin-bottom:5px}
    .menu-row{font-size:6px;color:rgba(15,45,8,.45);padding:4px 5px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .menu-row.sel{background:#1a4010;color:#8fac44}

    /* --- LEVEL SELECT --- */
    #panel-level{padding:4px}
    #level-title{font-size:6px;color:#1a4010;text-align:center;border-bottom:1px solid #1a4010;padding-bottom:2px;margin-bottom:3px}
    #level-list{overflow-y:hidden;flex:1}
    .lvl-row{font-size:5px;color:rgba(15,45,8,.45);padding:3px 5px;border-radius:2px}
    .lvl-row.sel{background:#1a4010;color:#8fac44}

    /* --- GAME --- */
    #panel-game{align-items:center}
    #game-hud{width:100%;font-size:6px;color:#1a4010;text-align:center;padding:2px 0 1px;letter-spacing:.5px}
    #game-canvas-wrap{display:flex;align-items:center;justify-content:center;flex:1;width:100%}
    #gameCanvas{image-rendering:pixelated;image-rendering:crisp-edges}
    #pause-overlay{
      position:absolute;inset:0;display:none;
      align-items:center;justify-content:center;
      background:rgba(143,172,68,.7);z-index:10;
    }
    #pause-overlay.show{display:flex}
    #pause-txt{font-size:9px;color:#1a4010;animation:blink .7s infinite}

    /* --- GAME OVER --- */
    #panel-over{align-items:center;justify-content:center;gap:8px;padding:8px}
    #over-title{font-size:10px;color:#1a4010;text-align:center;animation:blink .7s infinite}
    .over-info{font-size:6px;color:#1a4010;text-align:center}
    #over-hint{font-size:5px;color:rgba(15,45,8,.6);text-align:center;margin-top:2px}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* ===== NOKIA LOGO ===== */
    #nokia-logo{
      text-align:center;color:#3a3a6a;
      font-size:8px;letter-spacing:5px;
      margin:6px 0 4px;
    }

    /* ===== KEYPAD ===== */
    #keypad{display:flex;flex-direction:column;gap:5px}

    .key{
      background:linear-gradient(150deg,#3c3c60 0%,#28284a 100%);
      border:none;border-radius:7px;
      color:#c8c8e8;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      box-shadow:0 4px 0 #111,0 5px 8px rgba(0,0,0,.5);
      transition:transform .07s,box-shadow .07s;
      position:relative;overflow:hidden;
    }
    .key::before{
      content:'';position:absolute;top:0;left:0;right:0;height:40%;
      background:rgba(255,255,255,.06);border-radius:7px 7px 0 0;pointer-events:none;
    }
    .key:active,.key.pressed{
      transform:translateY(3px);
      box-shadow:0 1px 0 #111,0 2px 4px rgba(0,0,0,.5);
    }
    .km{font-family:'Press Start 2P',monospace;font-size:9px;line-height:1}
    .ks{font-size:5px;color:#9090b8;margin-top:2px;letter-spacing:.3px}

    /* Soft key row */
    #row-soft{display:grid;grid-template-columns:1fr 36px 1fr;gap:4px;padding:0 2px}
    .soft-key{height:24px}
    .soft-key .km{font-size:7px}
    #btn-end{background:linear-gradient(150deg,#5a1a1a,#3a0a0a);box-shadow:0 4px 0 #200,0 5px 8px rgba(0,0,0,.5)}
    #btn-end:active{box-shadow:0 1px 0 #200,0 2px 4px rgba(0,0,0,.5)}

    /* D-pad */
    #row-dpad{display:grid;grid-template-columns:1fr 44px 1fr;grid-template-rows:28px 44px 28px;gap:3px;padding:0 8px}
    .nav-key{height:100%}
    .nav-key .km{font-size:10px}
    #btn-ok{
      background:radial-gradient(circle at 40% 35%,#5a5a8a,#28284a);
      border-radius:50%;
      box-shadow:0 4px 0 #111,0 5px 8px rgba(0,0,0,.6);
    }
    #btn-ok .km{font-size:7px;color:#dde}
    #btn-ok:active{box-shadow:0 1px 0 #111,0 2px 4px rgba(0,0,0,.5)}
    .dpad-empty{background:transparent;box-shadow:none;pointer-events:none}
    .dpad-empty::before{display:none}

    /* Numpad */
    #row-num{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 2px}
    .num-key{height:32px}

    /* ===== FULLSCREEN MOBILE ===== */
    @media(max-width:320px){
      #phone{width:100vw;border-radius:0;padding:10px 10px 18px}
    }
    @media(max-width:480px) and (max-height:750px){
      #phone{transform:scale(.92);transform-origin:top center}
    }
    @media(max-width:480px) and (max-height:660px){
      #phone{transform:scale(.82);transform-origin:top center}
    }
    @media(max-width:480px){
      body{align-items:flex-start;overflow-y:auto;padding:0}
      #phone{border-radius:0;width:100%;min-width:0}
    }
  </style>
</head>
<body>
<div id="phone">
  <!-- Earpiece -->
  <div id="earpiece"></div>

  <!-- Screen wrapper -->
  <div id="screen-wrapper">
    <div id="screen">
      <!-- Status bar (always visible) -->
      <div id="status-bar">
        <div id="status-left">
          <div class="signal-bars">
            <div class="sbar"></div><div class="sbar"></div>
            <div class="sbar"></div><div class="sbar"></div>
          </div>
          <span id="operator-name">XCV Sterwork</span>
        </div>
        <div id="status-right">
          <div class="batt-wrap">
            <div id="batt-icon"><div id="batt-fill"></div></div>
            <span id="batt-pct">--</span>
          </div>
        </div>
      </div>

      <!-- Main area -->
      <div id="main-area">

        <!-- STARTUP -->
        <div id="panel-startup" class="panel">
          <div id="startup-logo">NOKIA</div>
        </div>

        <!-- LOCKSCREEN -->
        <div id="panel-lock" class="panel">
          <div id="lock-top">
            <div id="lock-icon">&#128274;</div>
            <div id="lock-time">00:00</div>
            <div id="lock-date">MON, 1 JAN</div>
          </div>
          <div id="slide-track">
            <div id="slide-hint">&gt;&gt;&gt; SLIDE TO UNLOCK &gt;&gt;&gt;</div>
            <div id="slide-thumb"></div>
          </div>
        </div>

        <!-- MENU -->
        <div id="panel-menu" class="panel">
          <div class="menu-title">MENU</div>
          <div class="menu-row sel" id="mi-0">&#9642; SNAKE</div>
          <div class="menu-row" id="mi-1">&#9643; &nbsp;- - -</div>
          <div class="menu-row" id="mi-2">&#9643; &nbsp;- - -</div>
          <div class="menu-row" id="mi-3">&#9643; &nbsp;- - -</div>
        </div>

        <!-- LEVEL SELECT -->
        <div id="panel-level" class="panel">
          <div id="level-title">SELECT LEVEL</div>
          <div id="level-list"></div>
        </div>

        <!-- GAME -->
        <div id="panel-game" class="panel">
          <div id="game-hud">SCORE:0 &nbsp;|&nbsp; BEST:0</div>
          <div id="game-canvas-wrap">
            <canvas id="gameCanvas"></canvas>
          </div>
          <div id="pause-overlay"><div id="pause-txt">PAUSED</div></div>
        </div>

        <!-- GAME OVER -->
        <div id="panel-over" class="panel">
          <div id="over-title">GAME OVER</div>
          <div class="over-info" id="over-score">SCORE: 0</div>
          <div class="over-info" id="over-best">BEST: 0</div>
          <div id="over-hint">OK=RETRY &nbsp; LEFT=MENU</div>
        </div>

      </div><!-- /main-area -->

      <!-- Softkey labels -->
      <div id="softkey-bar">
        <span class="sk-lbl" id="sk-left"></span>
        <span class="sk-lbl" id="sk-mid"></span>
        <span class="sk-lbl" id="sk-right"></span>
      </div>
    </div><!-- /screen -->
  </div><!-- /screen-wrapper -->

  <!-- Nokia logo -->
  <div id="nokia-logo">NOKIA</div>

  <!-- Keypad -->
  <div id="keypad">

    <!-- Soft key row -->
    <div id="row-soft">
      <button class="key soft-key" data-key="lsoft"><span class="km">&#9665;</span></button>
      <button class="key soft-key" id="btn-end" data-key="end"><span class="km" style="font-size:6px;color:#f88">END</span></button>
      <button class="key soft-key" data-key="rsoft"><span class="km">&#9655;</span></button>
    </div>

    <!-- D-pad -->
    <div id="row-dpad">
      <div class="key dpad-empty"></div>
      <button class="key nav-key" data-key="up"><span class="km">&#9650;</span></button>
      <div class="key dpad-empty"></div>
      <button class="key nav-key" data-key="left"><span class="km">&#9664;</span></button>
      <button class="key nav-key" id="btn-ok" data-key="ok"><span class="km">OK</span></button>
      <button class="key nav-key" data-key="right"><span class="km">&#9654;</span></button>
      <div class="key dpad-empty"></div>
      <button class="key nav-key" data-key="down"><span class="km">&#9660;</span></button>
      <div class="key dpad-empty"></div>
    </div>

    <!-- Number pad -->
    <div id="row-num">
      <button class="key num-key" data-key="1"><span class="km">1</span></button>
      <button class="key num-key" data-key="2"><span class="km">2</span><span class="ks">ABC</span></button>
      <button class="key num-key" data-key="3"><span class="km">3</span><span class="ks">DEF</span></button>
      <button class="key num-key" data-key="4"><span class="km">4</span><span class="ks">GHI</span></button>
      <button class="key num-key" data-key="5"><span class="km">5</span><span class="ks">JKL</span></button>
      <button class="key num-key" data-key="6"><span class="km">6</span><span class="ks">MNO</span></button>
      <button class="key num-key" data-key="7"><span class="km">7</span><span class="ks">PQRS</span></button>
      <button class="key num-key" data-key="8"><span class="km">8</span><span class="ks">TUV</span></button>
      <button class="key num-key" data-key="9"><span class="km">9</span><span class="ks">WXYZ</span></button>
      <button class="key num-key" data-key="star"><span class="km">*</span></button>
      <button class="key num-key" data-key="0"><span class="km">0</span><span class="ks">+</span></button>
      <button class="key num-key" data-key="hash"><span class="km">#</span></button>
    </div>

  </div><!-- /keypad -->
</div><!-- /phone -->

<script src="engineGame.js"></script>
</body>
</html>
